    let map;
    let activeInfoWindow;
let currentFilter = "both";
let minSize = null;
let maxSize = null;
function renderListings(filteredListings) {

  const container = document.getElementById("listings");

  // Clear the sidebar first
  container.innerHTML = "";

  filteredListings.forEach(listing => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${listing.image}" class="card-img">

      <div class="card-content">
        <div class="card-title">${listing.title}</div>
        <div class="card-sub">${listing.address}</div>

        ${listing.built ? `<div class="card-sub">Built in ${listing.built}</div>` : ""}

        <div class="card-price">${listing.price}</div>

        ${listing.rate ? `<div class="card-price">${listing.rate}</div>` : ""}

        ${listing.availability ? `<div class="card-sub">${listing.availability}</div>` : ""}

        ${listing.extra ? `<div class="card-sub">${listing.extra}</div>` : ""}

        <div class="card-type">${listing.type}</div>
      </div>

      <div class="card-brokers">
        ${listing.brokers.map(b=>`<img src="${b}" class="broker-img">`).join("")}
      </div>
    `;
card.onclick = () => {
  map.panTo({ lat: listing.lat, lng: listing.lng });
  map.setZoom(14);

  window.open(listing.link, "_blank");
};

    container.appendChild(card);
  });

  // Update results number
  document.querySelector(".results").innerText =
    filteredListings.length + " Results";
}
function updateVisibleListings() {

  const bounds = map.getBounds();

  // If map isn't ready yet, stop
  if (!bounds) return;

  const visibleListings = listings.filter(listing => {

    const position = new google.maps.LatLng(listing.lat, listing.lng);

 const inMap = bounds.contains(position);

const matchesFilter =
  currentFilter === "both" ||
  listing.category === currentFilter;

// Extract MIN and MAX SF from listing.price
let minListingSF = null;
let maxListingSF = null;

if (listing.price) {
  const numbers = listing.price.match(/\d{1,3}(,\d{3})*/g);

  if (numbers) {
    if (numbers.length === 1) {
      minListingSF = maxListingSF = parseInt(numbers[0].replace(/,/g, ""));
    } else {
      minListingSF = parseInt(numbers[0].replace(/,/g, ""));
      maxListingSF = parseInt(numbers[1].replace(/,/g, ""));
    }
  }
}

// Check if ranges overlap
const matchesSize =
  (!minSize || (maxListingSF && maxListingSF >= minSize)) &&
  (!maxSize || (minListingSF && minListingSF <= maxSize));

return inMap && matchesFilter && matchesSize;  });

  renderListings(visibleListings);
}

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        zoom:10,
        center:{lat:33.4484,lng:-112.0740}
});

map.addListener("idle", function () {
  updateVisibleListings();
});
// SEARCH BOX FUNCTIONALITY
const input = document.getElementById("searchBox");
const searchBox = new google.maps.places.SearchBox(input);

// When user selects a place
searchBox.addListener("places_changed", () => {
  const places = searchBox.getPlaces();

  if (places.length === 0) return;

  const place = places[0];

  if (!place.geometry) return;

  // Move map to selected place
  map.panTo(place.geometry.location);
  map.setZoom(13);

      listings.forEach(listing => {

        const marker = new google.maps.Marker({
          position:{lat:listing.lat,lng:listing.lng},
          map:map
        });

        const info = new google.maps.InfoWindow({
          content:`<div style="width:260px">
            <img src="${listing.image}" style="width:100%;height:140px;object-fit:cover;">
            <div style="padding:10px">
              <b>${listing.title}</b><br>
              ${listing.address}<br>
              <b>${listing.price}</b><br>
              ${listing.type}<br><br>
              <a href="${listing.link}" target="_blank">View Listing</a>
            </div>
          </div>`
        });

        marker.addListener("click",()=>{
          if(activeInfoWindow) activeInfoWindow.close();
          info.open(map,marker);
          activeInfoWindow = info;
        });

        const card = document.createElement("div");
        card.className="card";

       card.innerHTML = `
  <img src="${listing.image}" class="card-img">

  <div class="card-content">
    <div class="card-title">${listing.title}</div>
    <div class="card-sub">${listing.address}</div>

    ${listing.built ? `<div class="card-sub">Built in ${listing.built}</div>` : ""}

    <div class="card-price">${listing.price}</div>

    ${listing.rate ? `<div class="card-price">${listing.rate}</div>` : ""}

    ${listing.availability ? `<div class="card-sub">${listing.availability}</div>` : ""}

    ${listing.extra ? `<div class="card-sub">${listing.extra}</div>` : ""}

    <div class="card-type">${listing.type}</div>
  </div>

  <div class="card-brokers">
    ${listing.brokers.map(b=>`<img src="${b}" class="broker-img">`).join("")}
  </div>
`;

        card.onclick=()=>{
          map.panTo({lat:listing.lat,lng:listing.lng});
          map.setZoom(14);

          if(activeInfoWindow) activeInfoWindow.close();
          info.open(map,marker);
          activeInfoWindow = info;

          window.open(listing.link,"_blank");

          document.querySelectorAll('.card').forEach(el=>el.classList.remove('active'));
          card.classList.add('active');
        };

        container.appendChild(card);
      });
    }
// 🔽 DROPDOWN FUNCTIONALITY (PASTE HERE)
document.addEventListener("DOMContentLoaded", function () {

  const btn = document.getElementById("saleLeaseBtn");
  const menu = document.getElementById("saleLeaseMenu");

  // Toggle dropdown
  btn.addEventListener("click", function (e) {
    e.stopPropagation();
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
  });

  // Close when clicking outside
  document.addEventListener("click", function () {
    menu.style.display = "none";
  });

  // Handle option click
  document.querySelectorAll("#saleLeaseMenu .dropdown-item").forEach(item => {
    item.addEventListener("click", function () {

      document.querySelectorAll("#saleLeaseMenu .dropdown-item")
        .forEach(i => i.classList.remove("active"));

      this.classList.add("active");

 // Set filter
if (this.innerText === "For Sale") {
  currentFilter = "sale";
} else if (this.innerText === "For Lease") {
  currentFilter = "lease";
} else {
  currentFilter = "both";
}

// Update button text
btn.childNodes[0].nodeValue = this.innerText + " ▾";

// Apply filter immediately
updateVisibleListings();

      menu.style.display = "none";
    });
  });

});

  minSize = minVal ? parseInt(minVal) : null;
  maxSize = maxVal ? parseInt(maxVal) : null;
